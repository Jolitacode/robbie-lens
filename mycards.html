<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playing Cards</title>
    <style>
        #playing-cards {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            background-color: #1a4a1a;
            flex-wrap: wrap;
            gap: 20px;
            padding: 32px;

        }

        .card {
            height: 180px;
            width: 120px;
            display: flex;
            justify-content: space-between;
            background-color: white;
            border: 2px solid black;
            border-radius: 5px;
            padding: 5px;
            font-size: 1.5em
        }

        .left {
            display: flex;
            flex-direction: column;
            align-items: center;
            align-self: flex-start;
        }

        .middle {
            align-self: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .right {
            display: flex;
            flex-direction: column;
            align-items: center;
            align-self: flex-end;
            transform: rotate(180deg);
        }

        .red {
            color: red;
        }

        .black {
            color: black;
        }

        .reverse {
            transform: rotate(180deg);
        }
    </style>
</head>

<body>
    <main id="playing-cards">
        <div class="card black">
            <div class="left">
                <div>A</div>
                <div>&spades;</div>
            </div>
            <div class="middle">&spades;</div>
            <div class="right">
                <div>A</div>
                <div>&spades;</div>
            </div>
        </div>

        <div class="card black">
            <div class="left">
                <div>2</div>
                <div>&clubs;</div>
            </div>
            <div class="middle">
                <div>&clubs;</div>
                <div class="reverse">&clubs;</div>
            </div>
            <div class="right">
                <div>2</div>
                <div>&clubs;</div>
            </div>
        </div>

        <div class="card red">
            <div class="left">
                <div>3</div>
                <div>&hearts;</div>
            </div>
            <div class="middle">
                <div>&hearts;</div>
                <div>&hearts;</div>
                <div class="reverse">&hearts;</div>
            </div>
            <div class="right">
                <div>3</div>
                <div>&hearts;</div>
            </div>
        </div>

        <div class="card black">
            <div class="left">
                <div>4</div>
                <div>&clubs;</div>
            </div>
            <div class="middle">
                <div>&clubs;&clubs;</div>
                <div class="reverse">&clubs;&clubs;</div>
            </div>
            <div class="right">
                <div>4</div>
                <div>&clubs;</div>
            </div>
        </div>

        <div class="card red">
            <div class="left">
                <div>5</div>
                <div>&diams;</div>
            </div>
            <div class="middle">
                <div>&diams;&diams;</div>
                <div>&diams;</div>
                <div>&diams;&diams;</div>
            </div>
            <div class="right">
                <div>5</div>
                <div>&diams;</div>
            </div>
        </div>
    </main>
</body>

</html>
