<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playing Cards on Green Table</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0d5c2e;
            background-image:
                radial-gradient(ellipse at center, #0f7038 0%, #0a4a24 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        /* Green felt table texture */
        .table {
            position: relative;
            width: 900px;
            height: 600px;
            background:
                repeating-linear-gradient(45deg,
                    #0d5c2e,
                    #0d5c2e 2px,
                    #0a4a24 2px,
                    #0a4a24 4px);
            border-radius: 300px;
            border: 15px solid #5c3a1e;
            box-shadow:
                inset 0 0 100px rgba(0, 0, 0, 0.5),
                0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* Card base styles */
        .card {
            position: absolute;
            width: 100px;
            height: 145px;
            background: white;
            border-radius: 8px;
            box-shadow:
                2px 2px 10px rgba(0, 0, 0, 0.4),
                -1px -1px 5px rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 8px;
        }

        .card:hover {
            transform: translateY(-15px) rotate(5deg);
            z-index: 100;
        }

        /* Card suits and values */
        .card-top,
        .card-bottom {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-weight: bold;
            font-size: 18px;
            line-height: 1;
        }

        .card-bottom {
            transform: rotate(180deg);
        }

        .card-center {
            font-size: 40px;
            text-align: center;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Red suits */
        .hearts,
        .diamonds {
            color: #c41e3a;
        }

        /* Black suits */
        .spades,
        .clubs {
            color: #1a1a1a;
        }

        /* Position cards on table - aligned in a row */
        .card-1 {
            top: 50%;
            left: 30%;
            transform: translate(-50%, -50%);
        }

        .card-1:hover {
            transform: translate(-50%, -50%) translateY(-15px);
        }

        .card-2 {
            top: 50%;
            left: 42%;
            transform: translate(-50%, -50%);
        }

        .card-2:hover {
            transform: translate(-50%, -50%) translateY(-15px);
        }

        .card-3 {
            top: 50%;
            left: 54%;
            transform: translate(-50%, -50%);
        }

        .card-3:hover {
            transform: translate(-50%, -50%) translateY(-15px);
        }

        .card-4 {
            top: 50%;
            left: 66%;
            transform: translate(-50%, -50%);
        }

        .card-4:hover {
            transform: translate(-50%, -50%) translateY(-15px);
        }

        .card-5 {
            top: 50%;
            left: 78%;
            transform: translate(-50%, -50%);
        }

        .card-5:hover {
            transform: translate(-50%, -50%) translateY(-15px);
        }

        /* Card back design */
        .card-back {
            background: linear-gradient(135deg, #1a237e 25%, #283593 25%, #283593 50%, #1a237e 50%, #1a237e 75%, #283593 75%);
            background-size: 20px 20px;
            border: 3px solid #fff;
        }

        .card-back::after {
            content: '♠';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            color: rgba(255, 255, 255, 0.3);
        }

        /* Table decorations */
        .table::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200px;
            height: 200px;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .table::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 350px;
            height: 350px;
            transform: translate(-50%, -50%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 50%;
        }
    </style>
</head>

<body>
    <div class="table">
        <!-- Card 1: Ace of Hearts -->
        <div class="card card-1">
            <div class="card-top hearts">A<br>♥</div>
            <div class="card-center hearts">♥</div>
            <div class="card-bottom hearts">A<br>♥</div>
        </div>

        <!-- Card 2: King of Spades -->
        <div class="card card-2">
            <div class="card-top spades">K<br>♠</div>
            <div class="card-center spades">♠</div>
            <div class="card-bottom spades">K<br>♠</div>
        </div>

        <!-- Card 3: Queen of Diamonds -->
        <div class="card card-3">
            <div class="card-top diamonds">Q<br>♦</div>
            <div class="card-center diamonds">♦</div>
            <div class="card-bottom diamonds">Q<br>♦</div>
        </div>

        <!-- Card 4: Jack of Clubs -->
        <div class="card card-4">
            <div class="card-top clubs">J<br>♣</div>
            <div class="card-center clubs">♣</div>
            <div class="card-bottom clubs">J<br>♣</div>
        </div>

        <!-- Card 5: 10 of Diamonds -->
        <div class="card card-5">
            <div class="card-top diamonds">10<br>♦</div>
            <div class="card-center diamonds">♦</div>
            <div class="card-bottom diamonds">10<br>♦</div>
        </div>
    </div>
</body>

</html>
